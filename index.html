<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Watchlist | Matthew Martell</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    
    <header>
        <div class="width-container">
            <h1>Find Your Film</h1>
            <button><a href="">My Watchlist</a></button>
        </div>
    </header>

    <div class="form-container">
        <form action="">
            <img src="images/Search.png" alt="A small grey magnifying glass">
            <input type="search" placeholder="Search for a movie" id="search-el">
            <button id="search-btn">Search</button>
        </form>
    </div>

    <main>
        <div class="width-container none">
            <p>Unable to find what you're looking for. Please try another search.</p>
        </div>
        <div class="width-container none">
            <img src="images/Icon (1).png" alt="">
            <p>Start exploring</p>
        </div>
        <section class="info-section">
            
        </section>
        
    </main>
    
    <script src="index.js"></script>
</body>
</html>
